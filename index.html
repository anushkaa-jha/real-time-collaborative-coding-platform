<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CodeSync</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav>

        <h1>💻 CodeSync</h1>

        <!-- Buttons -->
        <div class="nav-buttons">
            <input id="roomInput" placeholder="Room ID"/>
            <button id="joinRoomBtn">Join Room</button>
        </div>

    </nav>

    <!-- Main Container -->
    <div class="container">

        <!-- Sidebar -->
        <aside>

            <h2>Connected Users</h2>

            <!-- User List -->
            <ul class="user-list", id="userList"></ul>
                

        </aside>

        <!-- Editor Section -->
        <main>

            <!-- Editor Top Bar -->
           <div class="editor-top">

              <h2 id="fileNameDisplay">Editing: main.js</h2>

             <button id="runBtn">Run</button>

           </div>
              <!-- File Tabs -->
               <div class="tabs" id="tabsContainer">

                 <div class="tab active-tab" data-file="main.js">
                 <span>🟨 main.js</span>
                 <button class="close-tab">×</button>
                 </div>

                 <div class="tab" data-file="style.css">
                 <span>🎨 style.css</span>
                 <button class="close-tab">×</button>
                 </div>

                 <div class="tab add-tab" id="addTab">
                 +
                 </div>

                </div> 
         <!-- Editor Wrapper -->
         <div class="editor-wrapper">

         <!-- Line Numbers -->
         <div class="line-numbers" id="lineNumbers">

         </div>

         <!-- Code Editor -->
         <textarea id="editor" placeholder="Write your code here...">console.log("Sync Your Project");</textarea>

         </div>

            <!-- Output Section -->
            <div class="output-section">
                <h3>Output</h3>
                <div class="output-box">
                   <iframe id="outputFrame" title="Output"></iframe>
                </div>
            </div>

        </main>

    </div>

    <!-- Status Bar -->
<footer>
    <p>Connected | JavaScript | UTF-8</p>
</footer>

    <!-- JS File -->
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
