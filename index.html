<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CodeSync</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav>

        <h1>💻 CodeSync</h1>

        <!-- Buttons -->
        <div class="nav-buttons">

        <button>Create Room</button>

        <button>Join Room</button>

    </div>

    </nav>

    <!-- Main Container -->
    <div class="container">

        <!-- Sidebar -->
        <aside>

            <h2>Connected Users</h2>

            <!-- User List -->
            <ul class="user-list">
                <li>🟢 User1</li>
                <li>🟢 User2</li>
                <li>🔴 User3</li>

        </aside>

        <!-- Editor Section -->
        <main>

            <!-- Editor Top Bar -->
           <div class="editor-top">

              <h2>Editor Area</h2>

             <button>Run</button>

           </div>

            
            <!-- Editor Wrapper -->
<div class="editor-wrapper">

    <!-- Fake Line Numbers -->
    <div class="line-numbers">

        1<br>
        2<br>
        3<br>
        4<br>
        5<br>

    </div>

    <!-- Code Editor -->
    <textarea placeholder="Write your code here..."></textarea>

</div>

            <!-- Output Section -->
            <div class="output-section">
                <h3>Output</h3>
                <div class="output-box">
                   Output will be displayed here...
                </div>
            </div>

        </main>

    </div>

    <!-- Status Bar -->
<footer>

    <p>Connected | JavaScript | UTF-8</p>

</footer>

    <!-- JS File -->
    <script src="script.js"></script>

</body>

</html>
