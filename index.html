<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CodeSync</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav>

        <h1>CodeSync</h1>

        <!-- Buttons -->
        <div class="nav-buttons">

        <button>Create Room</button>

        <button>Join Room</button>

    </div>

    </nav>

    <!-- Main Container -->
    <div class="container">

        <!-- Sidebar -->
        <aside>

            <h2>Users</h2>

        </aside>

        <!-- Editor Section -->
        <main>

            <!-- Editor Top Bar -->
           <div class="editor-top">

              <h2>Editor Area</h2>

             <button>Run</button>

           </div>

            <textarea placeholder="Write your code here..."></textarea>

        </main>

    </div>

    <!-- JS File -->
    <script src="script.js"></script>

</body>

</html>
